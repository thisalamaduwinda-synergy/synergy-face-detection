greeting:
  camera_channel: 1
  camera_host: 169.254.18.90
  camera_password: Synergy2026
  camera_user: admin
  cooldown_seconds: 0
  enabled: true
  output: both
  template: Hi, {name}
  tts_engine: edge
  vip_template: Welcome, {name}. Please proceed to the reception.
